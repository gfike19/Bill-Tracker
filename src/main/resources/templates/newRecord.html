<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head th:replace="base :: head">
<body>
<span th:replace="base :: scripts"></span>
<h1>Add New Record</h1>
<div class="container">
    <h1>Create New Record</h1>
    <form method="post">
        <div class="form-group">
            <label for="month">Enter a month: </label>
            <input type="number" id="month" name="month" min="1" max="31" value="th:value=${month}"/>
        </div>
        <div class="form-group">
            <label for="year">Enter a year: </label>
            <input type="number" name="year" id="year" min="2022" value="th:value=${year}"/>
        </div>
        <input type="submit" id="submit" name="submit" value="Submit" class="btn btn-primary"/>
    </form>
    <form action="/">
        <input type="submit" value="Back" class="btn btn"/>
    </form>
</div>
</body>
</html>

</div>
